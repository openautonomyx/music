<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {

}
.logo span { color: var(--muted); font-size: 11px; margin-left: 8px; letter-spacing: 0.04em; text-transform: none; }

.share-btn {

}

}

.input-row {
  display: flex;
  gap: 8px;

}

}
.input-main:focus { border-color: var(--cyan); }
.input-main::placeholder { color: var(--muted); }

.btn-action {
  padding: 10px 18px;
  background: var(--blue);
  border: none;
  border-radius: 3px;
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;

}
.btn-action:hover { background: #2470d4; }

input[type=file] { display: none; }

/* PLAYER AREA */
.player-area { padding: 16px 24px; }

.waveform-wrap {
  width: 100%;
  height: 80px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  margin-bottom: 12px;

}
canvas { width: 100%; height: 100%; display: block; opacity: 1; transition: opacity 0.3s; }
canvas.paused { opacity: 0.38; }
.waveform-idle {

/* LOADING */
.loading-bars { display: none; height: 30px; align-items: center; justify-content: center; gap: 3px; margin: 12px 0; }
.loading-bars.active { display: flex; }
.bar { width: 3px; height: 20px; background: var(--cyan); border-radius: 1px; animation: pulse 0.8s ease-in-out infinite; }
.bar:nth-child(2) { animation-delay: 0.1s; } .bar:nth-child(3) { animation-delay: 0.2s; }
.bar:nth-child(4) { animation-delay: 0.3s; } .bar:nth-child(5) { animation-delay: 0.4s; }
.bar:nth-child(6) { animation-delay: 0.5s; } .bar:nth-child(7) { animation-delay: 0.6s; }
.bar:nth-child(8) { animation-delay: 0.7s; }
@keyframes pulse { 0%,100% { transform: scaleY(0.4); opacity: 0.4; } 50% { transform: scaleY(1); opacity: 1; } }

.error-card { display: none; background: rgba(255,50,50,0.08); border: 1px solid rgba(255,50,50,0.3); border-radius: 3px; padding: 12px; color: #ff6b6b; font-size: 12px; margin: 10px 0; }

.toast {

  text-align: center;

<div class="header">
  <div class="logo">Autonomyx<span>Music Player</span></div>
  <button class="share-btn" onclick="shareLink()">SHARE LINK</button>
</div>

<div class="shell">
  <!-- INPUT: Search / URL / Upload -->
  <div class="input-row">
    <input class="input-main" type="text" id="mainInput" placeholder="Search songs, paste YouTube/Spotify URL, or stream direct audio URL...">
    <button class="btn-action" id="goBtn" onclick="handleInput()">GO</button>
    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">UPLOAD</button>
  </div>
  <input type="file" id="fileInput" accept="audio/*" multiple onchange="loadFiles(this.files)">

  <!-- PLAYER -->
  <div class="player-area">

      <iframe id="ytEmbed" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="waveform-wrap">
      <canvas id="waveCanvas"></canvas>

    <!-- SEARCH RESULTS -->

  </button>
  <div class="section-body" id="moodBody">

      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>

    </div>
    <div class="playlist-grid" id="playlistGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>&copy; 2026 <a href="https://www.openautonomyx.com" target="_blank" style="color:var(--cyan);text-decoration:none;">AutonomyX</a> &middot; From Foundational To Frontier: FullStack AI </footer>

<script>
// ---- UTILS ----
function fmt(s) { if (!s||isNaN(s)) return '0:00'; const m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+String(sec).padStart(2,'0'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

// ---- SHARE LINK ----
function shareLink() {
  const input = document.getElementById('mainInput').value.trim();
  const url = new URL(window.location.href.split('?')[0]);
  if (input) url.searchParams.set('q', input);
  navigator.clipboard.writeText(url.toString()).then(() => showToast('Link copied!')).catch(() => showToast('Failed to copy'));
}

// ---- SECTION TOGGLE ----
function toggleSection(btn, bodyId) {
  btn.classList.toggle('open');
  document.getElementById(bodyId).classList.toggle('open');
}

// ---- LYRICS TOGGLE ----
function toggleLyrics() {
  const pane = document.getElementById('lyricsPane');
  const btn = document.getElementById('lyricsToggle');
  pane.classList.toggle('open');
  btn.classList.toggle('active');
  if (pane.classList.contains('open') && currentTrackName) {
    fetchLyrics(currentTrackName);
  }
}

let currentTrackName = '';

async function fetchLyrics(query) {
  if (!query) return;
  const textEl = document.getElementById('lyricsText');
  const metaEl = document.getElementById('lyricsMeta');
  textEl.textContent = 'Searching lyrics...';
  metaEl.textContent = '';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        system: 'You are a lyrics assistant. Return ONLY the song lyrics as plain text. Start with the song title and artist on the first line, then a blank line, then the lyrics. If you cannot find exact lyrics, provide your best approximation and note it. No markdown, no code fences.',
        messages: [{ role: 'user', content: 'Lyrics for: ' + query }]
      })
    });
    const data = await res.json();
    textEl.textContent = data.content[0].text;
    metaEl.textContent = 'Powered by AI — lyrics may not be 100% accurate';
  } catch(e) {
    textEl.textContent = 'Could not fetch lyrics. Check your connection.';
  }
}

// ---- AUDIO ENGINE ----
let audioCtx, analyser;
const audio = new Audio();
audio.crossOrigin = 'anonymous';
let audioSrc, raf, queue = [], qIdx = 0;

const canvas = document.getElementById('waveCanvas');
const ctx = canvas.getContext('2d');

function initCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function resizeCanvas(c) { c.width = c.offsetWidth * devicePixelRatio; c.height = c.offsetHeight * devicePixelRatio; }

function setupAnalyser() {
  initCtx();
  if (audioSrc) { try { audioSrc.disconnect(); } catch(e) {} }
  audioSrc = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  audioSrc.connect(analyser);
  analyser.connect(audioCtx.destination);
  drawWave();
}

function drawWave() {
  cancelAnimationFrame(raf);
  resizeCanvas(canvas);
  const buf = new Float32Array(analyser.fftSize);
  function loop() {
    raf = requestAnimationFrame(loop);
    analyser.getFloatTimeDomainData(buf);
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle = '#00CFFF';
    ctx.lineWidth = 1.5 * devicePixelRatio;
    ctx.beginPath();
    const step = w / buf.length;
    buf.forEach((v,i) => { const x = i*step, y = (v*0.8+1)/2*h; i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); });
    ctx.stroke();
    canvas.classList.toggle('paused', audio.paused);
  }
  loop();
}

function togglePlay() {
  if (!audio.src) return;
  initCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = '&#10074;&#10074;'; }
  else { audio.pause(); document.getElementById('playBtn').innerHTML = '&#9654;'; }
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  document.getElementById('seekBar').value = (audio.currentTime / audio.duration) * 1000;
  document.getElementById('trackTime').textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
});

audio.addEventListener('ended', () => {
  if (qIdx + 1 < queue.length) playTrack(qIdx + 1);
  else document.getElementById('playBtn').innerHTML = '&#9654;';
});

function seekTo(v) { if (audio.duration) audio.currentTime = (v/1000) * audio.duration; }
function setVol(v) { audio.volume = v; }

// ---- FILE UPLOAD ----
function loadFiles(files) {
  queue = Array.from(files);
  if (!queue.length) return;
  qIdx = 0;
  renderQueue();
  playTrack(0);
}

function playTrack(i) {
  if (i < 0 || i >= queue.length) return;
  qIdx = i;
  audio.src = URL.createObjectURL(queue[i]);
  document.getElementById('idleMsg').style.display = 'none';
  document.getElementById('embedWrap').classList.remove('active');
  setupAnalyser();
  audio.play().then(() => { document.getElementById('playBtn').innerHTML = '&#10074;&#10074;'; }).catch(()=>{});
  currentTrackName = queue[i].name.replace(/\.[^.]+$/, '');
  document.getElementById('trackName').textContent = currentTrackName;
  highlightQueue(i);
  if (document.getElementById('lyricsPane').classList.contains('open')) fetchLyrics(currentTrackName);
}

function renderQueue() {
  const wrap = document.getElementById('queueWrap');
  const list = document.getElementById('queueList');
  wrap.style.display = queue.length > 1 ? 'block' : 'none';
  list.innerHTML = queue.map((f,i) => '<div class="queue-item '+(i===qIdx?'active':'')+'" onclick="playTrack('+i+')"><span class="qi-num">'+String(i+1).padStart(2,'0')+'</span>'+esc(f.name.replace(/\.[^.]+$/,''))+'</div>').join('');
}

function highlightQueue(i) { document.querySelectorAll('.queue-item').forEach((el,j) => el.classList.toggle('active', j===i)); }

// ---- MAIN INPUT HANDLER ----
function handleInput() {
  const val = document.getElementById('mainInput').value.trim();
  if (!val) return;
  const errEl = document.getElementById('errorCard');
  errEl.style.display = 'none';

  // YouTube URL
  const ytMatch = val.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  if (ytMatch) {
    playYouTube(ytMatch[1], val);
    return;
  }

  // YouTube URL without ID (playlist, channel, etc.)
  if (/youtube\.com|youtu\.be/.test(val)) {
    playYouTubeSearch(val);
    return;
  }

  // Spotify URL — extract track info and search YouTube
  if (/spotify\.com/.test(val)) {
    handleSpotify(val);
    return;
  }

  // Direct audio URL
  if (/\.(mp3|ogg|wav|aac|flac|m4a|webm)(\?.*)?$/i.test(val)) {
    playDirectUrl(val);
    return;
  }

  // Otherwise treat as search query
  doSearch(val);
}

function playYouTube(videoId, originalUrl) {
  document.getElementById('ytEmbed').src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1';
  document.getElementById('embedWrap').classList.add('active');
  currentTrackName = 'YouTube: ' + videoId;
  document.getElementById('trackName').textContent = currentTrackName;
  document.getElementById('idleMsg').style.display = 'none';
}

function playYouTubeSearch(url) {
  // Open in embed search
  doSearch(url.replace(/https?:\/\/(www\.)?youtube\.com\/(results\?search_query=)?/, ''));
}

async function handleSpotify(url) {
  document.getElementById('trackName').textContent = 'Loading Spotify track...';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        system: 'Extract the song title and artist from this Spotify URL. Return ONLY a JSON object: {"title":"...","artist":"...","youtubeId":"...or null"}. No markdown.',
        messages: [{ role: 'user', content: url }]
      })
    });
    const data = await res.json();
    const info = JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    if (info.youtubeId) {
      playYouTube(info.youtubeId);
    }
    currentTrackName = info.artist + ' - ' + info.title;
    document.getElementById('trackName').textContent = currentTrackName;
    document.getElementById('mainInput').value = info.artist + ' ' + info.title;
    if (document.getElementById('lyricsPane').classList.contains('open')) fetchLyrics(currentTrackName);
    if (!info.youtubeId) doSearch(info.artist + ' ' + info.title);
  } catch(e) {
    document.getElementById('errorCard').textContent = 'Could not parse Spotify URL';
    document.getElementById('errorCard').style.display = 'block';
  }
}

function playDirectUrl(url) {
  audio.src = url;
  document.getElementById('idleMsg').style.display = 'none';
  document.getElementById('embedWrap').classList.remove('active');
  currentTrackName = url.split('/').pop().replace(/\?.*/, '').replace(/\.[^.]+$/, '') || 'Stream';
  document.getElementById('trackName').textContent = currentTrackName;
  setupAnalyser();
  audio.play()
    .then(() => { document.getElementById('playBtn').innerHTML = '&#10074;&#10074;'; })
    .catch(() => {
      document.getElementById('errorCard').textContent = "Couldn't load this URL. Try a direct .mp3 link or upload the file.";
      document.getElementById('errorCard').style.display = 'block';
    });
  if (document.getElementById('lyricsPane').classList.contains('open')) fetchLyrics(currentTrackName);
}

// ---- SEARCH ----
async function doSearch(q) {
  const bars = document.getElementById('loadingBars');
  const grid = document.getElementById('resultsGrid');
  bars.classList.add('active');
  grid.innerHTML = '';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are a music search assistant. Return ONLY a JSON array of 6 objects. No markdown, no code fences.\nEach object: {"title":string,"artist":string,"year":number,"description":string,"youtubeId":string|null,"youtubeSearchUrl":string}\nyoutubeId: YouTube video ID (11 chars) if confident, else null.\nyoutubeSearchUrl: "https://www.youtube.com/results?search_query=" + encodeURIComponent(artist + " " + title)',
        messages: [{ role: 'user', content: 'Search music: ' + q }]
      })
    });
    const data = await res.json();
    const text = data.content[0].text.replace(/```json|```/g,'').trim();
    const results = JSON.parse(text);
    renderResults(results);
  } catch(e) {
    grid.innerHTML = '<div class="error-card" style="display:block;grid-column:1/-1">Search failed.</div>';
  } finally {
    bars.classList.remove('active');
  }
}

function renderResults(results) {
  window._searchResults = results;
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = results.map((r, i) => {
    const hasId = r.youtubeId && r.youtubeId.length === 11;
    const thumb = hasId
      ? '<img class="result-thumb" src="https://img.youtube.com/vi/'+r.youtubeId+'/mqdefault.jpg" onerror="this.style.display=\'none\'">'
      : '<div class="result-thumb-placeholder">&#9654;</div>';
    return '<div class="result-card" onclick="playResult('+i+')">'+thumb
      +'<div class="result-body"><div class="result-title">'+esc(r.title)+'</div>'
      +'<div class="result-meta">'+esc(r.artist)+' &middot; '+(r.year||'')+'</div></div></div>';
  }).join('');
}

function playResult(idx) {
  const r = window._searchResults[idx];
  if (!r) return;
  document.querySelectorAll('.result-card').forEach((c,i) => c.classList.toggle('active', i===idx));
  currentTrackName = r.artist + ' - ' + r.title;
  document.getElementById('trackName').textContent = currentTrackName;
  if (r.youtubeId && r.youtubeId.length === 11) {
    playYouTube(r.youtubeId);
  } else {
    window.open(r.youtubeSearchUrl, '_blank');
  }
  if (document.getElementById('lyricsPane').classList.contains('open')) fetchLyrics(currentTrackName);
}

// ---- MOOD PLAYLIST ----
let lastMood = '', regenCount = 0;

async function generatePlaylist(isRegen) {
  const mood = document.getElementById('moodInput').value.trim();
  if (!mood) return;
  lastMood = mood;
  if (isRegen) regenCount++;
  const genBtn = document.getElementById('genBtn');
  const regenBtn = document.getElementById('regenBtn');
  const bars = document.getElementById('loadingBars');
  const grid = document.getElementById('playlistGrid');
  genBtn.disabled = true; regenBtn.disabled = true;
  bars.classList.add('active'); grid.innerHTML = '';
  const seed = isRegen ? ' (variation '+regenCount+', pick different tracks)' : '';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are a music curator. Return ONLY a JSON array of 10 track objects. No markdown, no code fences.\nEach: {"title":string,"artist":string,"year":number,"tags":string[],"reason":string,"youtubeSearchUrl":string,"soundcloudSearchUrl":string}\nyoutubeSearchUrl = "https://www.youtube.com/results?search_query=" + encodeURIComponent(artist+" "+title)\nsoundcloudSearchUrl = "https://soundcloud.com/search?q=" + encodeURIComponent(artist+" "+title)',
        messages: [{ role: 'user', content: 'Playlist for: ' + mood + seed }]
      })
    });
    const data = await res.json();
    const tracks = JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    grid.innerHTML = tracks.map(t => '<div class="track-card"><div class="tc-top"><div><div class="tc-title">'+esc(t.title)+'</div><div class="tc-artist">'+esc(t.artist)+'</div></div><div class="tc-year">'+t.year+'</div></div><div class="tc-tags">'+(t.tags||[]).map(tag=>'<span class="tag">'+esc(tag)+'</span>').join('')+'</div><div class="tc-reason">'+esc(t.reason)+'</div><div class="tc-links"><a href="'+esc(t.youtubeSearchUrl)+'" target="_blank" class="btn-link btn-yt">&#9654; YouTube</a><a href="'+esc(t.soundcloudSearchUrl)+'" target="_blank" class="btn-link btn-sc">&#9729; SoundCloud</a></div></div>').join('');
    regenBtn.style.display = '';
  } catch(e) {
    grid.innerHTML = '<div class="error-card" style="display:block">Failed to generate playlist.</div>';
  } finally {
    genBtn.disabled = false; regenBtn.disabled = false;
    bars.classList.remove('active');
  }
}

// ---- SHAREABLE URL ----
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (q) {
    document.getElementById('mainInput').value = q;
    setTimeout(() => handleInput(), 500);
  }
});

// ---- KEYBOARD SHORTCUT ----
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
});

// ---- DRAG & DROP ----
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files.length) loadFiles(e.dataTransfer.files); });

// ---- ENTER KEY ----
document.getElementById('mainInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleInput(); });
</script>
